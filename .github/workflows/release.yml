name: Release

on:
  push:
    tags:
      - "*"

jobs:
  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ${{ contains(steps.get_version.outputs.VERSION, 'canary') }}; then
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --prerelease \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          else
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          fi

  # ネイティブビルド
  build-prebuilt:
    name: "Build prebuilt (${{ matrix.target }})"
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu-24.04_x86_64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - target: ubuntu-22.04_x86_64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - target: macos_arm64
            os: macos-26
            rust_target: aarch64-apple-darwin
          - target: windows_x86_64
            os: windows-2025
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install build dependencies (Linux native)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libclang-dev \
            libx11-dev
      - run: rustup update stable
      - name: Build (native)
        run: cargo build --release --features source-build --target ${{ matrix.rust_target }}
      - name: Package prebuilt artifacts (non-Windows)
        if: runner.os != 'Windows'
        run: |
          OUT_DIR=$(find target/${{ matrix.rust_target }}/release/build/shiguredo_webrtc-*/out -maxdepth 0 -type d | head -1)
          if [ -z "$OUT_DIR" ]; then
            echo "ERROR: OUT_DIR が見つかりません"
            exit 1
          fi
          echo "OUT_DIR: $OUT_DIR"
          mkdir -p staging/lib staging/include
          cp "$OUT_DIR/lib/libwebrtc_c.a" staging/lib/
          cp "$OUT_DIR/bindings.rs" staging/
          cp LICENSE staging/
          cp THIRD_PARTY_LICENSES.md staging/
          while IFS= read -r -d '' header; do
            rel_path="${header#webrtc/src/}"
            dest_path="staging/include/${rel_path}"
            mkdir -p "$(dirname "$dest_path")"
            cp "$header" "$dest_path"
          done < <(find webrtc/src -type f -name '*.h' ! -name '*.impl.h' -print0)
          tar czf "libwebrtc_c-${{ matrix.target }}.tar.gz" -C staging .
      - name: Package prebuilt artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          $pattern = "target/${{ matrix.rust_target }}/release/build/shiguredo_webrtc-*/out"
          $outDir = Get-ChildItem -Path $pattern -Directory -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $outDir) {
            Write-Error "ERROR: OUT_DIR が見つかりません"
            exit 1
          }
          Write-Host "OUT_DIR: $($outDir.FullName)"
          New-Item -ItemType Directory -Force -Path "staging/lib" | Out-Null
          New-Item -ItemType Directory -Force -Path "staging/include" | Out-Null
          Copy-Item "$($outDir.FullName)/lib/webrtc_c.lib" "staging/lib/"
          Copy-Item "$($outDir.FullName)/bindings.rs" "staging/"
          Copy-Item "LICENSE" "staging/"
          Copy-Item "THIRD_PARTY_LICENSES.md" "staging/"
          $srcRoot = (Resolve-Path "webrtc/src").Path
          Get-ChildItem -Path $srcRoot -Recurse -File -Filter "*.h" |
            Where-Object { $_.Name -notlike "*.impl.h" } |
            ForEach-Object {
              $relativePath = $_.FullName.Substring($srcRoot.Length).TrimStart('\', '/')
              $destPath = Join-Path "staging/include" $relativePath
              $destDir = Split-Path -Parent $destPath
              New-Item -ItemType Directory -Force -Path $destDir | Out-Null
              Copy-Item $_.FullName $destPath
            }
          tar -czf "libwebrtc_c-${{ matrix.target }}.tar.gz" -C staging .
      - name: Verify packaged files (non-Windows)
        if: runner.os != 'Windows'
        run: |
          archive="libwebrtc_c-${{ matrix.target }}.tar.gz"
          tar tzf "$archive" | grep -Eq '(^|\./)bindings\.rs$'
          tar tzf "$archive" | grep -Eq '(^|\./)include/webrtc_c\.h$'
          tar tzf "$archive" | grep -Eq '(^|\./)LICENSE$'
          tar tzf "$archive" | grep -Eq '(^|\./)THIRD_PARTY_LICENSES\.md$'
          if tar tzf "$archive" | grep -Eq '(^|\./)include/.*\.impl\.h$'; then
            echo "ERROR: include contains forbidden *.impl.h headers"
            exit 1
          fi
      - name: Verify packaged files (Windows)
        if: runner.os == 'Windows'
        run: |
          $archive = "libwebrtc_c-${{ matrix.target }}.tar.gz"
          $entries = tar -tzf $archive
          if (-not ($entries | Select-String -Pattern '(^|\./)bindings\.rs$')) {
            Write-Error "ERROR: bindings.rs is missing in package"
            exit 1
          }
          if (-not ($entries | Select-String -Pattern '(^|\./)include/webrtc_c\.h$')) {
            Write-Error "ERROR: include/webrtc_c.h is missing in package"
            exit 1
          }
          if (-not ($entries | Select-String -Pattern '(^|\./)LICENSE$')) {
            Write-Error "ERROR: LICENSE is missing in package"
            exit 1
          }
          if (-not ($entries | Select-String -Pattern '(^|\./)THIRD_PARTY_LICENSES\.md$')) {
            Write-Error "ERROR: THIRD_PARTY_LICENSES.md is missing in package"
            exit 1
          }
          if ($entries | Select-String -Pattern '(^|\./)include/.*\.impl\.h$') {
            Write-Error "ERROR: include contains forbidden *.impl.h headers"
            exit 1
          }
      - name: Generate SHA256 checksum (non-Windows)
        if: runner.os != 'Windows'
        run: shasum -a 256 "libwebrtc_c-${{ matrix.target }}.tar.gz" > "libwebrtc_c-${{ matrix.target }}.tar.gz.sha256"
      - name: Generate SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        run: |
          $archive = "libwebrtc_c-${{ matrix.target }}.tar.gz"
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "libwebrtc_c-${{ matrix.target }}.tar.gz" \
            "libwebrtc_c-${{ matrix.target }}.tar.gz.sha256" \
            --clobber

  # クロスコンパイル
  build-prebuilt-cross:
    name: "Build prebuilt (${{ matrix.target }})"
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu-24.04_armv8
            os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
          - target: ubuntu-22.04_armv8
            os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
          - target: raspberry-pi-os_armv8
            os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install build dependencies (Linux cross)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libclang-dev \
            clang \
            python3 \
            debian-archive-keyring \
            gcc-aarch64-linux-gnu
          # cargo-shiguredo-sysroot は独自 apt 設定で sources.list のみ差し替えるため、
          # Debian の keyring を trusted.gpg.d に配置しないと trixie の署名検証に失敗する。
          sudo install -Dm644 /usr/share/keyrings/debian-archive-keyring.gpg \
            /etc/apt/trusted.gpg.d/debian-archive-keyring.gpg
      - run: rustup update stable
      - name: Add cross-compile target and build sysroot with shiguredo-sysroot
        run: |
          rustup target add aarch64-unknown-linux-gnu
          cargo install shiguredo_sysroot
          cargo shiguredo-sysroot --config sysroot/${{ matrix.target }}.json
      - name: Build (cross)
        env:
          WEBRTC_C_TARGET: ${{ matrix.target }}
          WEBRTC_C_SYSROOT: ${{ github.workspace }}/target/shiguredo-sysroot/${{ matrix.target }}/sysroot
        run: cargo build --release --features source-build --target ${{ matrix.rust_target }}
      - name: Package prebuilt artifacts
        run: |
          OUT_DIR=$(find target/${{ matrix.rust_target }}/release/build/shiguredo_webrtc-*/out -maxdepth 0 -type d | head -1)
          if [ -z "$OUT_DIR" ]; then
            echo "ERROR: OUT_DIR が見つかりません"
            exit 1
          fi
          echo "OUT_DIR: $OUT_DIR"
          mkdir -p staging/lib staging/include
          cp "$OUT_DIR/lib/libwebrtc_c.a" staging/lib/
          cp "$OUT_DIR/bindings.rs" staging/
          cp LICENSE staging/
          cp THIRD_PARTY_LICENSES.md staging/
          while IFS= read -r -d '' header; do
            rel_path="${header#webrtc/src/}"
            dest_path="staging/include/${rel_path}"
            mkdir -p "$(dirname "$dest_path")"
            cp "$header" "$dest_path"
          done < <(find webrtc/src -type f -name '*.h' ! -name '*.impl.h' -print0)
          tar czf "libwebrtc_c-${{ matrix.target }}.tar.gz" -C staging .
      - name: Verify packaged files
        run: |
          archive="libwebrtc_c-${{ matrix.target }}.tar.gz"
          tar tzf "$archive" | grep -Eq '(^|\./)bindings\.rs$'
          tar tzf "$archive" | grep -Eq '(^|\./)include/webrtc_c\.h$'
          tar tzf "$archive" | grep -Eq '(^|\./)LICENSE$'
          tar tzf "$archive" | grep -Eq '(^|\./)THIRD_PARTY_LICENSES\.md$'
          if tar tzf "$archive" | grep -Eq '(^|\./)include/.*\.impl\.h$'; then
            echo "ERROR: include contains forbidden *.impl.h headers"
            exit 1
          fi
      - name: Generate SHA256 checksum
        run: shasum -a 256 "libwebrtc_c-${{ matrix.target }}.tar.gz" > "libwebrtc_c-${{ matrix.target }}.tar.gz.sha256"
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "libwebrtc_c-${{ matrix.target }}.tar.gz" \
            "libwebrtc_c-${{ matrix.target }}.tar.gz.sha256" \
            --clobber

  # Android クロスコンパイル（build.rs 経由）
  build-prebuilt-android:
    name: "Build prebuilt (android_arm64)"
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libclang-dev clang
      - run: rustup update stable
      - run: rustup target add aarch64-linux-android
      - name: Build (android arm64)
        run: cargo build --release --features source-build --target aarch64-linux-android
      - name: Package prebuilt artifacts
        run: |
          OUT_DIR=$(find target/aarch64-linux-android/release/build/shiguredo_webrtc-*/out -maxdepth 0 -type d | head -1)
          if [ -z "$OUT_DIR" ]; then
            echo "ERROR: OUT_DIR が見つかりません"
            exit 1
          fi
          echo "OUT_DIR: $OUT_DIR"
          mkdir -p staging/lib staging/include staging/jar
          cp "$OUT_DIR/lib/libwebrtc_c.a" staging/lib/
          cp "$OUT_DIR/bindings.rs" staging/
          cp LICENSE staging/
          cp THIRD_PARTY_LICENSES.md staging/
          while IFS= read -r -d '' header; do
            rel_path="${header#webrtc/src/}"
            dest_path="staging/include/${rel_path}"
            mkdir -p "$(dirname "$dest_path")"
            cp "$header" "$dest_path"
          done < <(find webrtc/src -type f -name '*.h' ! -name '*.impl.h' -print0)
          WEBRTC_JAR=$(find "$OUT_DIR" -type f -name "webrtc.jar" | head -1)
          if [ -z "$WEBRTC_JAR" ]; then
            echo "ERROR: webrtc.jar is missing"
            exit 1
          fi
          cp "$WEBRTC_JAR" staging/jar/webrtc.jar
          tar czf "libwebrtc_c-android_arm64.tar.gz" -C staging .
      - name: Verify packaged files
        run: |
          archive="libwebrtc_c-android_arm64.tar.gz"
          tar tzf "$archive" | grep -Eq '(^|\./)bindings\.rs$'
          tar tzf "$archive" | grep -Eq '(^|\./)include/webrtc_c\.h$'
          tar tzf "$archive" | grep -Eq '(^|\./)jar/webrtc\.jar$'
          tar tzf "$archive" | grep -Eq '(^|\./)LICENSE$'
          tar tzf "$archive" | grep -Eq '(^|\./)THIRD_PARTY_LICENSES\.md$'
          if tar tzf "$archive" | grep -Eq '(^|\./)include/.*\.impl\.h$'; then
            echo "ERROR: include contains forbidden *.impl.h headers"
            exit 1
          fi
      - name: Generate SHA256 checksum
        run: shasum -a 256 "libwebrtc_c-android_arm64.tar.gz" > "libwebrtc_c-android_arm64.tar.gz.sha256"
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "libwebrtc_c-android_arm64.tar.gz" \
            "libwebrtc_c-android_arm64.tar.gz.sha256" \
            --clobber

  # iOS クロスコンパイル（build.rs 経由）
  build-prebuilt-ios:
    name: "Build prebuilt (ios_arm64)"
    needs: create-release
    permissions:
      contents: write
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - run: rustup update stable
      - run: rustup target add aarch64-apple-ios
      - name: Build (ios arm64)
        run: cargo build --release --features source-build --target aarch64-apple-ios
      - name: Package prebuilt artifacts
        run: |
          OUT_DIR=$(find target/aarch64-apple-ios/release/build/shiguredo_webrtc-*/out -maxdepth 0 -type d | head -1)
          if [ -z "$OUT_DIR" ]; then
            echo "ERROR: OUT_DIR が見つかりません"
            exit 1
          fi
          echo "OUT_DIR: $OUT_DIR"
          mkdir -p staging/lib staging/include
          cp "$OUT_DIR/lib/libwebrtc_c.a" staging/lib/
          cp "$OUT_DIR/bindings.rs" staging/
          cp LICENSE staging/
          cp THIRD_PARTY_LICENSES.md staging/
          while IFS= read -r -d '' header; do
            rel_path="${header#webrtc/src/}"
            dest_path="staging/include/${rel_path}"
            mkdir -p "$(dirname "$dest_path")"
            cp "$header" "$dest_path"
          done < <(find webrtc/src -type f -name '*.h' ! -name '*.impl.h' -print0)
          tar czf "libwebrtc_c-ios_arm64.tar.gz" -C staging .
      - name: Verify packaged files
        run: |
          archive="libwebrtc_c-ios_arm64.tar.gz"
          tar tzf "$archive" | grep -Eq '(^|\./)bindings\.rs$'
          tar tzf "$archive" | grep -Eq '(^|\./)include/webrtc_c\.h$'
          tar tzf "$archive" | grep -Eq '(^|\./)LICENSE$'
          tar tzf "$archive" | grep -Eq '(^|\./)THIRD_PARTY_LICENSES\.md$'
          if tar tzf "$archive" | grep -Eq '(^|\./)include/.*\.impl\.h$'; then
            echo "ERROR: include contains forbidden *.impl.h headers"
            exit 1
          fi
      - name: Generate SHA256 checksum
        run: shasum -a 256 "libwebrtc_c-ios_arm64.tar.gz" > "libwebrtc_c-ios_arm64.tar.gz.sha256"
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "libwebrtc_c-ios_arm64.tar.gz" \
            "libwebrtc_c-ios_arm64.tar.gz.sha256" \
            --clobber

  publish:
    needs: [build-prebuilt, build-prebuilt-cross, build-prebuilt-android, build-prebuilt-ios]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  slack_notify:
    needs: [create-release, build-prebuilt, build-prebuilt-cross, build-prebuilt-android, build-prebuilt-ios, publish]
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-rust-sdk
          notify_mode: failure_and_fixed
        env:
          GH_TOKEN: ${{ github.token }}
